<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>līlā — ecosystem visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f100f;
    color: #b8b4a8;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #canvas {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    image-rendering: pixelated;
  }

  .panel {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(15, 16, 15, 0.88);
    border: 1px solid rgba(184, 180, 168, 0.12);
    border-radius: 6px;
    padding: 14px 16px;
    min-width: 200px;
    backdrop-filter: blur(8px);
  }

  .panel h1 {
    font-size: 14px;
    font-weight: 500;
    color: #d4d0c4;
    margin-bottom: 2px;
    letter-spacing: 0.5px;
  }

  .panel .sub {
    font-size: 9px;
    color: rgba(184, 180, 168, 0.5);
    margin-bottom: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stat {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    border-bottom: 1px solid rgba(184, 180, 168, 0.06);
  }

  .stat:last-child { border-bottom: none; }
  .stat .label { color: rgba(184, 180, 168, 0.5); }
  .stat .value { color: #d4d0c4; font-weight: 400; }

  .events-panel {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(15, 16, 15, 0.88);
    border: 1px solid rgba(184, 180, 168, 0.12);
    border-radius: 6px;
    padding: 10px 14px;
    max-width: 340px;
    max-height: 140px;
    overflow: hidden;
    backdrop-filter: blur(8px);
    font-size: 10px;
  }

  .events-panel .event-line {
    padding: 2px 0;
    opacity: 0.7;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .events-panel .event-line.fresh { opacity: 1; }

  .legend {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(15, 16, 15, 0.88);
    border: 1px solid rgba(184, 180, 168, 0.12);
    border-radius: 6px;
    padding: 12px 14px;
    backdrop-filter: blur(8px);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 2px 0;
    font-size: 10px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .status-dot.connected { background: #6b8f5e; }
  .status-dot.disconnected { background: #8f5e5e; }
  .status-dot.connecting { background: #8f865e; }

  .rain-btn, .record-btn {
    position: fixed; bottom: 20px;
    background: rgba(45, 85, 110, 0.5);
    border: 1px solid rgba(70, 130, 150, 0.3);
    color: rgba(184, 180, 168, 0.85);
    padding: 10px 18px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .rain-btn { right: 20px; }
  .record-btn { right: 120px; }
  .rain-btn:hover, .record-btn:hover {
    background: rgba(55, 105, 130, 0.7);
    border-color: rgba(70, 130, 150, 0.6);
  }
  .rain-btn:active, .record-btn:active {
    background: rgba(70, 130, 150, 0.9);
  }
  .rain-btn.raining {
    background: rgba(45, 85, 110, 0.9);
    border-color: rgba(100, 170, 200, 0.5);
    color: rgba(200, 220, 230, 1);
  }
  .record-btn.recording {
    background: rgba(140, 50, 50, 0.8);
    border-color: rgba(180, 70, 70, 0.6);
    color: rgba(230, 180, 180, 1);
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="panel">
  <h1>līlā</h1>
  <div class="sub">ecosystem visualizer</div>
  <div class="stat"><span class="label">status</span><span class="value" id="status"><span class="status-dot connecting"></span>connecting</span></div>
  <div class="stat"><span class="label">tick</span><span class="value" id="tick">—</span></div>
  <div class="stat"><span class="label">entities</span><span class="value" id="entities">—</span></div>
  <div class="stat"><span class="label">events</span><span class="value" id="event-count">0</span></div>
  <div class="stat"><span class="label">fps</span><span class="value" id="fps">—</span></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#c4956a"></div>deer</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a87cc4"></div>butterfly</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3d6b3d; border-radius:50%"></div>oak</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6b8f5e"></div>grass</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c4a64a"></div>wildflower</div>
  <div class="legend-item"><div class="legend-dot" style="background:rgba(45,85,110,0.7); border-radius:50%"></div>water</div>
</div>

<div class="events-panel" id="events-panel"></div>

<button class="rain-btn" id="rain-btn" title="Send rainfall to replenish moisture">☔ rain</button>
<button class="record-btn" id="record-btn" title="Record 10 seconds of the simulation">⏺ record</button>

<script>
// ═══════════════════════════════════════════════════════
// līlā Browser Visualizer
// Connects to the worker WebSocket, renders the ecosystem
// ═══════════════════════════════════════════════════════

const GRID_SIZE = 32;
const CELL_PX = 18;
const PADDING = 40;
const CANVAS_SIZE = GRID_SIZE * CELL_PX + PADDING * 2;
const TICK_RATE = 0.1; // seconds

// ─── Colors ───────────────────────────────────────────
const COLORS = {
  bg:          '#0f100f',
  grid:        'rgba(184, 180, 168, 0.04)',
  gridMajor:   'rgba(184, 180, 168, 0.08)',

  // Moisture heatmap
  moistureHigh: [48, 58, 52],    // subtle teal — barely visible from field
  moistureMid:  [42, 44, 38],    // neutral dark
  moistureLow:  [72, 62, 42],    // dry amber (softened)

  // Entities
  deer:        '#c4956a',
  butterfly:   '#a87cc4',
  oak:         '#3d6b3d',
  oakCanopy:   'rgba(61, 107, 61, 0.12)',
  grass:       '#6b8f5e',
  grassWilt:   '#7a7254',
  wildflower:  '#7a8f5e',
  flowerBloom: '#c4a64a',

  // Events
  consumption: '#8faa6e',
  pollination: '#c4a64a',
  death:       '#6e5a5a',

  // Water
  waterFill:   [45, 85, 110],    // deep blue-teal
  waterEdge:   [55, 105, 125],   // lighter edge
  waterShine:  [70, 130, 150],   // highlight ripples

  // Text
  label:       'rgba(184, 180, 168, 0.35)',
};

// ─── State ────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_SIZE;
canvas.height = CANVAS_SIZE;

let ws = null;
let connected = false;
let currentTick = 0;
let totalEvents = 0;

// Entity state: id → { prev, next, species, type, skeleton_id, state }
const entities = new Map();

// Moisture grid: 32x32 flat array
const moisture = new Float32Array(GRID_SIZE * GRID_SIZE).fill(0.65);

// Particles for events
const particles = [];

// Water sources from tick packet
let waterSources = [];

// Event log
const eventLog = [];
const MAX_EVENT_LOG = 8;

// FPS tracking
let frameCount = 0;
let lastFpsTime = performance.now();
let displayFps = 0;

// Tick timing for interpolation
let lastTickTime = performance.now();

// ─── WebSocket ────────────────────────────────────────

function connect() {
  const wsUrl = `ws://${location.host}/ws`;
  setStatus('connecting');

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    setStatus('connected');
    // Send the demo world definition
    fetch('/world.json')
      .then(r => r.json())
      .then(world => {
        ws.send(JSON.stringify(world));
      })
      .catch(() => {
        // Fallback: send a minimal world if file not found
        console.warn('Could not load world.json, using minimal world');
        ws.send(JSON.stringify(buildMinimalWorld()));
      });
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === 'session_started') {
      console.log('Session started:', data);
      logEvent(`▸ ecosystem alive — ${data.entity_count} entities`);
      return;
    }
    handleTickPacket(data);
  };

  ws.onclose = () => {
    setStatus('disconnected');
    connected = false;
    setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    ws.close();
  };
}

function setStatus(state) {
  const el = document.getElementById('status');
  const dot = state === 'connected' ? 'connected'
    : state === 'connecting' ? 'connecting' : 'disconnected';
  el.innerHTML = `<span class="status-dot ${dot}"></span>${state}`;
  connected = state === 'connected';
}

// ─── Rain Control ────────────────────────────────────

document.getElementById('rain-btn').addEventListener('click', () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'rain', intensity: 0.8 }));

  // Visual feedback on button
  const btn = document.getElementById('rain-btn');
  btn.classList.add('raining');
  btn.textContent = '☔ raining...';
  setTimeout(() => {
    btn.classList.remove('raining');
    btn.textContent = '☔ rain';
  }, 1500);

  logEvent('🌧 rainfall — moisture replenished');
});

// ─── Recording ────────────────────────────────────

let mediaRecorder = null;
let recordedChunks = [];

document.getElementById('record-btn').addEventListener('click', () => {
  const btn = document.getElementById('record-btn');

  if (mediaRecorder && mediaRecorder.state === 'recording') {
    // Stop early
    mediaRecorder.stop();
    return;
  }

  const stream = canvas.captureStream(30);  // 30fps capture

  // Find a supported codec
  const codecs = [
    'video/webm; codecs=vp9',
    'video/webm; codecs=vp8',
    'video/webm',
    'video/mp4',
  ];
  const mimeType = codecs.find(c => MediaRecorder.isTypeSupported(c)) || '';
  const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';

  mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
  recordedChunks = [];

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `lila-recording.${ext}`;
    a.click();
    URL.revokeObjectURL(url);

    btn.classList.remove('recording');
    btn.textContent = '⏺ record';
    logEvent('⏹ recording saved');
  };

  mediaRecorder.start();
  btn.classList.add('recording');
  btn.textContent = '⏹ recording...';
  logEvent('⏺ recording started (10s)');

  // Auto-stop after 10 seconds
  setTimeout(() => {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
  }, 10000);
});

// ─── Tick Processing ──────────────────────────────────

function handleTickPacket(packet) {
  currentTick = packet.tick || 0;
  lastTickTime = performance.now();

  // Entity updates
  if (packet.entity_updates) {
    for (const u of packet.entity_updates) {
      let ent = entities.get(u.id);
      if (!ent) {
        ent = {
          id: u.id, type: '', species: '', skeleton_id: null,
          prev: { x: 0, z: 0 }, next: { x: 0, z: 0 },
          state: 'IDLE', state_vars: {}, motion_latent: null,
        };
        entities.set(u.id, ent);
      }
      // Shift next → prev for interpolation
      ent.prev.x = ent.next.x;
      ent.prev.z = ent.next.z;

      if (u.position) {
        ent.next.x = u.position[0];
        ent.next.z = u.position[2];
      }
      if (u.state) ent.state = u.state;
      if (u.state_vars) ent.state_vars = u.state_vars;
      if (u.motion_latent) ent.motion_latent = u.motion_latent;
    }
  }

  // Spawns
  if (packet.entity_spawns) {
    for (const s of packet.entity_spawns) {
      entities.set(s.id, {
        id: s.id,
        type: s.type || '',
        species: s.species || '',
        skeleton_id: s.skeleton_id || null,
        prev: { x: s.position[0], z: s.position[2] },
        next: { x: s.position[0], z: s.position[2] },
        state: s.state || 'IDLE',
        state_vars: s.state_vars || {},
        motion_latent: s.motion_latent || null,
      });
    }
  }

  // Removals
  if (packet.entity_removals) {
    for (const id of packet.entity_removals) {
      // Spawn a death particle before removing
      const ent = entities.get(id);
      if (ent) spawnParticles(ent.next.x, ent.next.z, COLORS.death, 6, 40);
      entities.delete(id);
    }
  }

  // Voxel deltas (moisture layer)
  if (packet.voxel_deltas && packet.voxel_deltas.moisture) {
    for (const [coord, val] of Object.entries(packet.voxel_deltas.moisture)) {
      const [x, , z] = coord.split(',').map(Number);
      if (x >= 0 && x < GRID_SIZE && z >= 0 && z < GRID_SIZE) {
        moisture[z * GRID_SIZE + x] = val;
      }
    }
  }

  // Events
  if (packet.events) {
    for (const ev of packet.events) {
      totalEvents++;
      handleEvent(ev);
    }
  }

  // Water sources (static, sent each tick)
  if (packet.water_sources && packet.water_sources.length > 0) {
    waterSources = packet.water_sources;
  }

  // Update UI
  document.getElementById('tick').textContent = currentTick;
  document.getElementById('entities').textContent = entities.size;
  document.getElementById('event-count').textContent = totalEvents;

  // Enrich entity type/species on first update from spawn data
  if (packet.entity_spawns) {
    for (const s of packet.entity_spawns) {
      const ent = entities.get(s.id);
      if (ent) {
        ent.type = s.type;
        ent.species = s.species;
        ent.skeleton_id = s.skeleton_id;
      }
    }
  }
}

function handleEvent(ev) {
  const pos = ev.position || [0, 0, 0];
  const x = pos[0], z = pos[2];

  switch (ev.type) {
    case 'CONSUMPTION':
      spawnParticles(x, z, COLORS.consumption, 5, 30);
      logEvent(`🌿 ${ev.source_id} grazes ${ev.target_id}`);
      break;
    case 'POLLINATION':
      spawnParticles(x, z, COLORS.pollination, 8, 50);
      logEvent(`🦋 ${ev.source_id} pollinates ${ev.target_id}`);
      break;
    case 'DEATH_NATURAL':
    case 'DEATH_STARVE':
      spawnParticles(x, z, COLORS.death, 10, 60);
      logEvent(`💀 ${ev.source_id} dies`);
      break;
    case 'STATE_CHANGE':
      logEvent(`◇ ${ev.source_id}: ${ev.prev_state} → ${ev.new_state}`);
      break;
  }
}

function logEvent(text) {
  eventLog.unshift({ text, time: performance.now() });
  if (eventLog.length > MAX_EVENT_LOG) eventLog.pop();

  const panel = document.getElementById('events-panel');
  panel.innerHTML = eventLog.map((e, i) => {
    const age = (performance.now() - e.time) / 1000;
    const fresh = age < 2 ? ' fresh' : '';
    return `<div class="event-line${fresh}">${e.text}</div>`;
  }).join('');
}

// ─── Particles ────────────────────────────────────────

function spawnParticles(worldX, worldZ, color, count, lifetime) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: worldX,
      z: worldZ,
      vx: (Math.random() - 0.5) * 2,
      vz: (Math.random() - 0.5) * 2,
      life: lifetime + Math.random() * 20,
      maxLife: lifetime + 20,
      color: color,
      size: 2 + Math.random() * 2,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * 0.03;
    p.z += p.vz * 0.03;
    p.vx *= 0.97;
    p.vz *= 0.97;
    p.life--;
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

// ─── Rendering ────────────────────────────────────────

function worldToCanvas(wx, wz) {
  return [
    PADDING + wx * CELL_PX,
    PADDING + wz * CELL_PX,
  ];
}

function render() {
  const now = performance.now();

  // FPS
  frameCount++;
  if (now - lastFpsTime > 1000) {
    displayFps = frameCount;
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('fps').textContent = displayFps;
  }

  // Interpolation factor (0..1 between ticks)
  const tickElapsed = (now - lastTickTime) / 1000;
  const t = Math.min(1.0, tickElapsed / TICK_RATE);

  // Clear
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

  drawMoistureHeatmap();
  drawWater();
  drawGrid();
  drawEntities(t);
  drawParticles();

  updateParticles();

  requestAnimationFrame(render);
}

function drawGrid() {
  for (let i = 0; i <= GRID_SIZE; i++) {
    const major = i % 8 === 0;
    ctx.strokeStyle = major ? COLORS.gridMajor : COLORS.grid;
    ctx.lineWidth = major ? 0.5 : 0.3;

    const p = PADDING + i * CELL_PX;

    ctx.beginPath();
    ctx.moveTo(p, PADDING);
    ctx.lineTo(p, PADDING + GRID_SIZE * CELL_PX);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(PADDING, p);
    ctx.lineTo(PADDING + GRID_SIZE * CELL_PX, p);
    ctx.stroke();
  }
}

function drawMoistureHeatmap() {
  for (let z = 0; z < GRID_SIZE; z++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      const val = moisture[z * GRID_SIZE + x];
      const [cx, cz] = worldToCanvas(x, z);

      let r, g, b;
      if (val > 0.5) {
        // Blend from mid to high
        const f = (val - 0.5) * 2;
        r = lerp(COLORS.moistureMid[0], COLORS.moistureHigh[0], f);
        g = lerp(COLORS.moistureMid[1], COLORS.moistureHigh[1], f);
        b = lerp(COLORS.moistureMid[2], COLORS.moistureHigh[2], f);
      } else {
        // Blend from low to mid
        const f = val * 2;
        r = lerp(COLORS.moistureLow[0], COLORS.moistureMid[0], f);
        g = lerp(COLORS.moistureLow[1], COLORS.moistureMid[1], f);
        b = lerp(COLORS.moistureLow[2], COLORS.moistureMid[2], f);
      }

      ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
      ctx.fillRect(cx, cz, CELL_PX, CELL_PX);
    }
  }
}

function drawWater() {
  const now = performance.now();

  for (const ws of waterSources) {
    const [wx, , wz] = ws.position;
    const [cx, cz] = worldToCanvas(wx, wz);
    // Center on the voxel cell, not top-left corner
    const centerX = cx + CELL_PX / 2;
    const centerZ = cz + CELL_PX / 2;
    const radiusPx = ws.radius * CELL_PX;
    const level = ws.water_level !== undefined ? ws.water_level : 1.0;

    if (level < 0.02 || radiusPx < 1) continue;  // Dried up

    const alpha = 0.3 + level * 0.4;  // Fades as water drops

    // Outer soft glow — extends past the moisture voxels to mask them
    const glowR = radiusPx * 1.8;
    const glow = ctx.createRadialGradient(centerX, centerZ, radiusPx * 0.5, centerX, centerZ, glowR);
    glow.addColorStop(0, `rgba(${COLORS.waterFill[0]}, ${COLORS.waterFill[1]}, ${COLORS.waterFill[2]}, ${alpha * 0.8})`);
    glow.addColorStop(0.6, `rgba(${COLORS.waterFill[0]}, ${COLORS.waterFill[1]}, ${COLORS.waterFill[2]}, ${alpha * 0.5})`);
    glow.addColorStop(1, 'rgba(45, 85, 110, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(centerX, centerZ, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Main water body — higher opacity to fully cover heatmap
    const waterGrad = ctx.createRadialGradient(centerX - radiusPx * 0.2, centerZ - radiusPx * 0.2, 0, centerX, centerZ, radiusPx);
    waterGrad.addColorStop(0, `rgba(${COLORS.waterShine[0]}, ${COLORS.waterShine[1]}, ${COLORS.waterShine[2]}, ${alpha * 0.95})`);
    waterGrad.addColorStop(0.6, `rgba(${COLORS.waterFill[0]}, ${COLORS.waterFill[1]}, ${COLORS.waterFill[2]}, ${alpha * 0.9})`);
    waterGrad.addColorStop(1, `rgba(${COLORS.waterEdge[0]}, ${COLORS.waterEdge[1]}, ${COLORS.waterEdge[2]}, ${alpha * 0.7})`);
    ctx.fillStyle = waterGrad;
    ctx.beginPath();
    ctx.arc(centerX, centerZ, radiusPx, 0, Math.PI * 2);
    ctx.fill();

    // Edge ring
    ctx.strokeStyle = `rgba(${COLORS.waterEdge[0]}, ${COLORS.waterEdge[1]}, ${COLORS.waterEdge[2]}, ${alpha * 0.4})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(centerX, centerZ, radiusPx, 0, Math.PI * 2);
    ctx.stroke();

    // Subtle animated ripples (only when water is above 30%)
    if (level > 0.3) {
      for (let i = 0; i < 2; i++) {
        const phase = (now * 0.001 + i * 1.8) % 3.0;
        const rippleR = radiusPx * 0.3 + phase * radiusPx * 0.25;
        const rippleAlpha = Math.max(0, (0.15 - phase * 0.05) * level);
        ctx.strokeStyle = `rgba(${COLORS.waterShine[0]}, ${COLORS.waterShine[1]}, ${COLORS.waterShine[2]}, ${rippleAlpha})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(centerX + Math.sin(i * 4.7) * radiusPx * 0.2, centerZ + Math.cos(i * 4.7) * radiusPx * 0.15, rippleR, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }
}

function drawEntities(t) {
  // Draw order: trees (back) → grass → flowers → deer → butterflies (front)
  const layers = [
    { types: ['TREE'], draw: drawTree },
    { types: ['PLANT'], species: ['meadow_grass'], draw: drawGrass },
    { types: ['PLANT'], species: ['wildflower'], draw: drawFlower },
    { types: ['ANIMAL'], draw: drawDeer },
    { types: ['INSECT'], draw: drawButterfly },
  ];

  for (const layer of layers) {
    for (const ent of entities.values()) {
      if (!layer.types.includes(ent.type)) continue;
      if (layer.species && !layer.species.includes(ent.species)) continue;

      const x = lerp(ent.prev.x, ent.next.x, t);
      const z = lerp(ent.prev.z, ent.next.z, t);
      const [cx, cz] = worldToCanvas(x, z);

      layer.draw(ctx, cx, cz, ent);
    }
  }
}

function drawTree(ctx, cx, cz, ent) {
  const growth = ent.state_vars.growth || 0.5;
  const canopyR = 4.0 * CELL_PX * growth * 0.5;

  // Canopy shadow
  ctx.fillStyle = COLORS.oakCanopy;
  ctx.beginPath();
  ctx.arc(cx, cz, canopyR, 0, Math.PI * 2);
  ctx.fill();

  // Trunk
  const trunkR = 3 + growth * 3;
  ctx.fillStyle = COLORS.oak;
  ctx.beginPath();
  ctx.arc(cx, cz, trunkR, 0, Math.PI * 2);
  ctx.fill();

  // Highlight ring
  ctx.strokeStyle = 'rgba(61, 107, 61, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cz, trunkR + 1, 0, Math.PI * 2);
  ctx.stroke();
}

function drawGrass(ctx, cx, cz, ent) {
  // Dormant — faded root marker
  if (ent.state === 'DORMANT') {
    ctx.fillStyle = '#5a5244';
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(cx, cz, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1.0;
    return;
  }

  const growth = ent.state_vars.growth || 0.1;
  const hydration = ent.state_vars.hydration || 0.5;
  const size = 2 + growth * 4;

  // Color shifts with hydration
  const color = hydration > 0.3 ? COLORS.grass : COLORS.grassWilt;

  ctx.fillStyle = color;
  ctx.globalAlpha = 0.5 + growth * 0.5;

  // Draw as a small cluster of dots
  for (let i = 0; i < 3; i++) {
    const ox = Math.sin(i * 2.1) * 3;
    const oz = Math.cos(i * 2.1) * 3;
    ctx.beginPath();
    ctx.arc(cx + ox, cz + oz, size * 0.6, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1.0;
}

function drawFlower(ctx, cx, cz, ent) {
  // Dormant — faded root marker
  if (ent.state === 'DORMANT') {
    ctx.fillStyle = '#6b5e3d';
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(cx, cz, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1.0;
    return;
  }

  const growth = ent.state_vars.growth || 0.1;
  const isFruiting = ent.state === 'FRUITING';

  // Stem
  ctx.fillStyle = COLORS.wildflower;
  ctx.beginPath();
  ctx.arc(cx, cz, 2, 0, Math.PI * 2);
  ctx.fill();

  if (isFruiting) {
    // Bloom — bright pulsing glow
    const pulse = 0.7 + Math.sin(performance.now() * 0.004) * 0.3;
    const bloomR = 4 + growth * 3;

    ctx.fillStyle = COLORS.flowerBloom;
    ctx.globalAlpha = pulse;
    ctx.beginPath();
    ctx.arc(cx, cz, bloomR, 0, Math.PI * 2);
    ctx.fill();

    // Glow
    ctx.globalAlpha = pulse * 0.2;
    ctx.beginPath();
    ctx.arc(cx, cz, bloomR * 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1.0;
  }
}

function drawDeer(ctx, cx, cz, ent) {
  const state = ent.state;
  const hunger = ent.state_vars.hunger || 0;

  // Size varies slightly with state
  const size = state === 'RESTING' ? 5 : 7;

  // Direction from velocity (prev → next)
  const dx = ent.next.x - ent.prev.x;
  const dz = ent.next.z - ent.prev.z;
  const angle = Math.atan2(dz, dx);

  ctx.save();
  ctx.translate(cx, cz);
  ctx.rotate(angle);

  // Body (triangle pointing in movement direction)
  ctx.fillStyle = COLORS.deer;
  ctx.beginPath();
  ctx.moveTo(size, 0);
  ctx.lineTo(-size * 0.7, -size * 0.5);
  ctx.lineTo(-size * 0.7, size * 0.5);
  ctx.closePath();
  ctx.fill();

  // Head dot
  ctx.fillStyle = '#d4aa7a';
  ctx.beginPath();
  ctx.arc(size * 0.6, 0, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // State indicator ring
  if (state === 'DRINKING') {
    ctx.strokeStyle = 'rgba(90, 140, 180, 0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cz, size + 3, 0, Math.PI * 2);
    ctx.stroke();
  } else if (state === 'RESTING') {
    ctx.strokeStyle = 'rgba(180, 170, 140, 0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 2]);
    ctx.beginPath();
    ctx.arc(cx, cz, size + 2, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Motion latent visualization (subtle halo color shift)
  if (ent.motion_latent && ent.skeleton_id) {
    const ml = ent.motion_latent;
    const intensity = (Math.abs(ml[0]) + Math.abs(ml[2])) * 0.3;
    ctx.strokeStyle = `rgba(196, 149, 106, ${intensity * 0.2})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(cx, cz, size + 5, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Label (only for deer)
  ctx.fillStyle = COLORS.label;
  ctx.font = '8px JetBrains Mono';
  ctx.textAlign = 'center';
  ctx.fillText(state.toLowerCase(), cx, cz + size + 10);
}

function drawButterfly(ctx, cx, cz, ent) {
  const time = performance.now() * 0.008;
  const wingFlap = Math.sin(time + cx * 0.1) * 0.5 + 0.5;

  ctx.save();
  ctx.translate(cx, cz);

  // Wings (two triangles that flap)
  const wingSpan = 5;
  const wingH = 3 * (0.5 + wingFlap * 0.5);

  ctx.fillStyle = COLORS.butterfly;
  ctx.globalAlpha = 0.7 + wingFlap * 0.3;

  // Left wing
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-wingSpan, -wingH);
  ctx.lineTo(-wingSpan * 0.3, -wingH * 0.5);
  ctx.closePath();
  ctx.fill();

  // Right wing
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(wingSpan, -wingH);
  ctx.lineTo(wingSpan * 0.3, -wingH * 0.5);
  ctx.closePath();
  ctx.fill();

  // Body
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#7a5a8f';
  ctx.beginPath();
  ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Pollinating glow
  if (ent.state === 'POLLINATING') {
    ctx.fillStyle = 'rgba(196, 166, 74, 0.15)';
    ctx.beginPath();
    ctx.arc(cx, cz, 10, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    const [cx, cz] = worldToCanvas(p.x, p.z);
    const alpha = p.life / p.maxLife;

    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha * 0.8;
    ctx.beginPath();
    ctx.arc(cx, cz, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1.0;
}

// ─── Utilities ────────────────────────────────────────

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function buildMinimalWorld() {
  return {
    version: '0.1',
    session_id: 'browser-viz-001',
    environment: {
      type: 'MEADOW', biome: 'TEMPERATE',
      climate: { temperature: 22, humidity: 0.6, rainfall: 0.4, wind_speed: 0.15, light_level: 0.85 },
      soil: { nitrogen: 0.7, phosphorus: 0.6, potassium: 0.5, moisture: 0.65, organic_matter: 0.4, ph: 6.8 },
      voxel_grid: { dimensions: [32, 32, 32], cell_size: 1.0 },
    },
    model: { adapter: 'mlp', seed: 42 },
    entities: [
      { id: 'deer_01', type: 'ANIMAL', species: 'deer', position: [16,0,14],
        metadata: { diet:'herbivore', body_mass:60, metabolism_rate:1, sensory_range:12, movement_speed:3, lifespan:800, reproduction_threshold:0.8 },
        skeleton_id: 'quadruped_medium' },
    ],
  };
}

// ─── Init ─────────────────────────────────────────────

// Determine entity types from first tick update (entity_updates don't
// carry type/species — we infer from the ID prefix or from spawn data).
// For the demo, we pre-populate types based on known IDs.
function inferEntityType(id) {
  if (id.startsWith('deer'))      return { type: 'ANIMAL', species: 'deer' };
  if (id.startsWith('butterfly')) return { type: 'INSECT', species: 'monarch' };
  if (id.startsWith('oak'))       return { type: 'TREE',  species: 'meadow_oak' };
  if (id.startsWith('grass'))     return { type: 'PLANT', species: 'meadow_grass' };
  if (id.startsWith('flower'))    return { type: 'PLANT', species: 'wildflower' };
  return { type: 'ANIMAL', species: 'unknown' };
}

// Patch handleTickPacket to infer types from IDs
const _origHandle = handleTickPacket;
handleTickPacket = function(packet) {
  _origHandle(packet);
  // Enrich entities missing type info
  for (const ent of entities.values()) {
    if (!ent.type) {
      const info = inferEntityType(ent.id);
      ent.type = info.type;
      ent.species = info.species;
    }
  }
};

// Start
connect();
requestAnimationFrame(render);

</script>
